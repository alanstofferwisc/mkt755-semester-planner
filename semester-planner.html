    .item-card:hover { transform: translateY(-1px); box-shadow: 0 2px 6px rgba(0,0,0,0.12); z-index: 1; }

</head>

// ======== UTILITIES ========
function parseDate(s) { const [y,m,d] = s.split('-').map(Number); return new Date(y,m-1,d); }
function formatDate(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function isSpringBreak(ds) { return ds >= CONFIG.springBreakStart && ds <= CONFIG.springBreakEnd; }
function isClassDay(d) { return CONFIG.classDays.includes(d.getDay()); }
function isWeekend(d) { const x = d.getDay(); return x===0||x===6; }
function deepClone(o) { return JSON.parse(JSON.stringify(o)); }
function truncate(s,n) { return s.length > n ? s.slice(0,n)+'...' : s; }
const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DAY_NAMES = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

function daysBetween(a, b) {
  return Math.round((parseDate(b) - parseDate(a)) / 86400000);
}
function addDays(dateStr, n) {
  const d = parseDate(dateStr); d.setDate(d.getDate() + n); return formatDate(d);
}
function getNextClassDay(dateStr) {
  let d = parseDate(dateStr); d.setDate(d.getDate()+1);
  for (let i=0;i<200;i++) { if (isClassDay(d) && !isSpringBreak(formatDate(d))) return formatDate(d); d.setDate(d.getDate()+1); }
  return null;
}
function getWeeks() {
  const weeks = []; let d = parseDate(CONFIG.firstWeekMonday); const end = parseDate(CONFIG.lastWeekSunday);
  while (d <= end) { const w=[]; for(let i=0;i<7;i++){w.push(new Date(d));d.setDate(d.getDate()+1);} weeks.push(w); }
  return weeks;
}

function loadState() {

    const s = localStorage.getItem(STORAGE_KEY);

// ======== SNAPSHOT / UNDO ========
function saveSnapshot() {
  state.history.push({ items: deepClone(state.items), lectureOrder: [...state.lectureOrder], nextId: state.nextId });
  if (state.history.length > 50) state.history.shift();
}
function undo() {
  if (!state.history.length) return;
  const snap = state.history.pop();
  state.items = snap.items; state.lectureOrder = snap.lectureOrder; state.nextId = snap.nextId;
  saveState(); render(); showToast('Undone');
}
function resetAll() {
  state.items = deepClone(INITIAL_ITEMS); state.lectureOrder = [...INITIAL_LECTURE_ORDER];
  state.nextId = 200; state.history = []; saveState(); render();
  showToast('Reset to original schedule');
}

// ======== PPC DEPENDENTS ========
function recalcPpcDependents(movedIds) {
  state.items.filter(i => i.ppcLectureOffset).forEach(dep => {
    const ppcIdx = state.lectureOrder.indexOf(dep.parentId);
    if (ppcIdx < 0) return;
    const targetIdx = ppcIdx + dep.ppcLectureOffset;
    if (targetIdx < state.lectureOrder.length) {
      const targetLect = state.items.find(i => i.id === state.lectureOrder[targetIdx]);
      if (targetLect) {
        const newDate = addDays(targetLect.date, -1);
        if (dep.date !== newDate) { dep.date = newDate; if (movedIds) movedIds.push(dep.id); }
      }
    }
  });
}

// ======== CASCADE LOGIC ========
function cascadeLectures(fromIdx) {
  const movedIds = [];
  let lastDate = state.items.find(i => i.id === state.lectureOrder[fromIdx]).date;
  for (let i = fromIdx + 1; i < state.lectureOrder.length; i++) {
    const lect = state.items.find(it => it.id === state.lectureOrder[i]);
    if (!lect) continue;
    const nextDate = getNextClassDay(lastDate);
    if (nextDate && lect.date !== nextDate) {
      const shift = daysBetween(lect.date, nextDate);
      const oldDate = lect.date;
      lect.date = nextDate;
      movedIds.push(lect.id);
      // Shift non-PPC dependents of this lecture
      state.items.filter(d => d.parentId === lect.id && !d.ppcLectureOffset).forEach(d => {
        d.date = addDays(d.date, shift);
        movedIds.push(d.id);
      });
    }
    lastDate = lect.date;
  }
  recalcPpcDependents(movedIds);
  return movedIds;
}

// ======== MOVE ITEM ========
function moveItem(itemId, newDate) {
  saveSnapshot();
  const item = state.items.find(i => i.id === itemId);
  const oldDate = item.date;
  let movedIds = [itemId];

  if (item.type === 'lecture' || state.lectureOrder.includes(itemId)) {
    const lectIdx = state.lectureOrder.indexOf(itemId);
    if (lectIdx >= 0) {
      // Validate order
      if (lectIdx > 0) {
        const prev = state.items.find(i => i.id === state.lectureOrder[lectIdx - 1]);
        if (prev && newDate <= prev.date) { state.history.pop(); showToast('Cannot place before the previous lecture in sequence','error'); return []; }
      }
      item.date = newDate;
      // Shift non-PPC dependents of THIS lecture
      const shift = daysBetween(oldDate, newDate);
      state.items.filter(d => d.parentId === itemId && !d.ppcLectureOffset).forEach(d => {
        d.date = addDays(d.date, shift); movedIds.push(d.id);
      });
      const cascaded = cascadeLectures(lectIdx);
      movedIds = movedIds.concat(cascaded);
    } else {
      item.date = newDate;
    }
  } else {
    item.date = newDate;
    // If this item has dependents (unlikely for non-lecture, but support it)
    const shift = daysBetween(oldDate, newDate);
    state.items.filter(d => d.parentId === itemId).forEach(d => {
      d.date = addDays(d.date, shift); movedIds.push(d.id);
    });
  }

  saveState();
  const cascadedCount = movedIds.length - 1;
  if (cascadedCount > 0) {
    showToast(`Moved to ${formatDateDisplay(newDate)}. ${cascadedCount} item${cascadedCount>1?'s':''} shifted.`, 'info', true);
  }
  return movedIds;
}

function formatDateDisplay(ds) { const d = parseDate(ds); return `${MONTH_NAMES[d.getMonth()]} ${d.getDate()}`; }

// ======== ADD / DELETE ========
function addItem(name, type, date, parentId) {
  saveSnapshot();
  const id = state.nextId++;
  const item = { id, name, type, date };
  if (parentId) item.parentId = parentId;
  state.items.push(item);

  if (type === 'lecture') {
    // Insert into lectureOrder at correct position
    let insertIdx = state.lectureOrder.length;
    for (let i = 0; i < state.lectureOrder.length; i++) {
      const lect = state.items.find(it => it.id === state.lectureOrder[i]);
      if (lect && lect.date > date) { insertIdx = i; break; }
    }
    state.lectureOrder.splice(insertIdx, 0, id);
    // Cascade from insertion point
    const cascaded = cascadeLectures(insertIdx);
    saveState(); render();
    showToast(`Added lecture. ${cascaded.length ? cascaded.length + ' items shifted.' : ''}`, 'info', cascaded.length > 0);
  } else {
    saveState(); render();
    showToast(`Added "${truncate(name, 30)}"`);
  }
}

function deleteItem(itemId) {
  saveSnapshot();
  const item = state.items.find(i => i.id === itemId);
  if (!item) return;

  // Unlink dependents
  state.items.filter(i => i.parentId === itemId).forEach(i => { delete i.parentId; delete i.ppcLectureOffset; });

  // Remove from lecture order
  const lectIdx = state.lectureOrder.indexOf(itemId);
  if (lectIdx >= 0) state.lectureOrder.splice(lectIdx, 1);

  // Remove item
  state.items = state.items.filter(i => i.id !== itemId);
  saveState(); render();
  showToast(`Removed "${truncate(item.name, 30)}"`, 'info', true);
}

// ======== MODAL ========
let modalPreDate = null;
function openModal(preDate) {
  modalPreDate = preDate || null;
  document.getElementById('modal-name').value = '';
  document.getElementById('modal-type').value = 'assignment';
  document.getElementById('modal-date').value = preDate || '';
  updateModalParentOptions();
  updateModalLinkedVisibility();
  document.getElementById('modal-overlay').classList.add('active');
  document.getElementById('modal-name').focus();
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('active'); }

function updateModalParentOptions() {
  const sel = document.getElementById('modal-parent');
  sel.innerHTML = '<option value="">None (independent)</option>';
  state.lectureOrder.forEach(lid => {
    const l = state.items.find(i => i.id === lid);
    if (l) sel.innerHTML += `<option value="${lid}">${truncate(l.name, 40)}</option>`;
  });
}
function updateModalLinkedVisibility() {
  const t = document.getElementById('modal-type').value;
  document.getElementById('modal-linked-section').className = 'linked-section' + (t === 'lecture' ? ' disabled' : '');
}
document.getElementById('modal-type').addEventListener('change', updateModalLinkedVisibility);

function submitModal() {
  const name = document.getElementById('modal-name').value.trim();
  const type = document.getElementById('modal-type').value;
  const date = document.getElementById('modal-date').value;
  const parentId = type !== 'lecture' ? (parseInt(document.getElementById('modal-parent').value) || null) : null;

  if (!name) { showToast('Please enter a name', 'error'); return; }
  if (!date) { showToast('Please select a date', 'error'); return; }
  if (type === 'lecture') {
    const d = parseDate(date);
    if (!isClassDay(d)) { showToast('Lectures must be on Monday or Wednesday', 'error'); return; }
    if (isSpringBreak(date)) { showToast('Cannot schedule during Spring Break', 'error'); return; }
  }
  addItem(name, type, date, parentId);
  closeModal();
}

// Close modal on overlay click or Escape
document.getElementById('modal-overlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

// ======== TOAST ========
function showToast(msg, type='info', showUndo=false) {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div'); t.className = 'toast';
  t.innerHTML = msg + (showUndo ? ' <span class="undo-link" onclick="undo()">Undo</span>' : '');
  if (type === 'error') t.style.background = '#DC2626';
  c.appendChild(t);
  requestAnimationFrame(() => t.classList.add('visible'));
  setTimeout(() => { t.classList.remove('visible'); setTimeout(() => t.remove(), 300); }, 3500);
}

// ======== RENDERING ========
function render() {
  const app = document.getElementById('app');
  const weeks = getWeeks();
  const springBreakItems = state.items.filter(i => isSpringBreak(i.date));
  const lectCount = state.items.filter(i => i.type==='lecture').length;
  const readCount = state.items.filter(i => i.type==='reading').length;

  let html = `<div class="header">
    <div class="header-left"><h1>${CONFIG.courseName} Semester Planner</h1>
      <div class="subtitle">${CONFIG.semesterName} &middot; ${state.lectureOrder.length} Lectures &middot; ${state.items.length} Total Items</div></div>
    <div class="header-right">
      <button class="btn btn-primary" onclick="openModal()">+ Add Item</button>
      <button class="btn" onclick="undo()" title="Ctrl+Z">Undo</button>
      <button class="btn btn-danger" onclick="if(confirm('Reset to original schedule?'))resetAll()">Reset</button>
      <button class="btn" onclick="exportSchedule()">Export CSV</button>
    </div></div>`;

  html += `<div class="legend">
    <span class="legend-title">Legend:</span>
    <span class="legend-item"><span class="legend-dot" style="background:var(--blue)"></span>Lecture</span>
    <span class="legend-item"><span class="legend-dot" style="background:var(--orange)"></span>Quiz</span>
    <span class="legend-item"><span class="legend-dot" style="background:var(--green)"></span>Assignment</span>
    <span class="legend-item"><span class="legend-dot" style="background:var(--teal)"></span>Reading</span>
    <span class="legend-item"><span class="legend-dot" style="background:var(--purple)"></span>Discussion</span>
    <span class="legend-item" style="margin-left:auto;font-size:0.7rem;color:var(--gray-400)">
      <span style="opacity:0.6">&#128279;</span> = linked to lecture &nbsp;
      <span style="opacity:0.6">&#8644;</span> = auto-cascades
    </span></div>`;

  html += `<div class="warning-banner ${springBreakItems.length===0?'hidden':''}">
    <span style="font-size:1.1rem">&#9888;</span>
    <span><strong>${springBreakItems.length} item${springBreakItems.length!==1?'s':''}</strong> scheduled during Spring Break (Mar 30 - Apr 5). Drag them to reschedule.</span></div>`;

  html += `<div class="calendar-scroll"><div class="calendar" id="calendar">`;
  html += `<div class="day-header wk-header">WK</div>`;
  for (let i=0;i<7;i++) {
    const di=(i+1)%7; html += `<div class="day-header ${CONFIG.classDays.includes(di)?'class-day':''}">${DAY_NAMES[i]}</div>`;
  }

  weeks.forEach((week, wi) => {
    const isBreakWeek = week.some(d => isSpringBreak(formatDate(d)));
    html += `<div class="week-num ${isBreakWeek?'spring-break-wk':''}">${wi+1}</div>`;
    week.forEach((day, di) => {
      const ds = formatDate(day);
      const dayItems = state.items.filter(i => i.date === ds);
      const isBreak = isSpringBreak(ds);
      const isCls = isClassDay(day);
      const isWk = isWeekend(day);
      let cc = 'day-cell';
      if (isBreak) cc += ' spring-break'; else if (isCls) cc += ' class-day-col'; else if (isWk) cc += ' weekend';

      html += `<div class="${cc}" data-date="${ds}">`;
      const mp = (day.getDate()===1||(wi===0&&di===0)) ? `<span class="month-name">${MONTH_NAMES[day.getMonth()]}</span> ` : '';
      html += `<div class="date-label">${mp}${day.getDate()}<span class="add-btn" data-add-date="${ds}" title="Add item on ${MONTH_NAMES[day.getMonth()]} ${day.getDate()}">+</span></div>`;
      if (isBreak && day.getDay()===3) html += `<div class="spring-break-label">Spring Break</div>`;

      // Sort: lectures first, then readings, then assignments, then quizzes
      const typeOrder = { lecture:0, reading:1, assignment:2, discussion:3, quiz:4 };
      dayItems.sort((a,b) => (typeOrder[a.type]||9) - (typeOrder[b.type]||9));

      dayItems.forEach(item => {
        const conflict = isBreak ? ' spring-break-conflict' : '';
        const isLect = state.lectureOrder.includes(item.id);
        const hasDeps = state.items.some(d => d.parentId === item.id);
        const isDep = item.parentId != null;
        const parentName = isDep ? (state.items.find(p => p.id === item.parentId)?.name || '') : '';
        const title = item.name + (isDep ? `\n↳ Linked to: ${parentName}` : '') + (item.ppcLectureOffset ? `\n(auto: day before lecture +${item.ppcLectureOffset})` : '');

        let icons = '';
        if (isDep) icons += `<span class="dep-icon" title="Linked to: ${parentName}">&#128279;</span>`;
        if (isLect) icons += `<span class="cascade-icon" title="Auto-cascades subsequent lectures">&#8644;</span>`;
        icons += `<span class="delete-btn" data-del-id="${item.id}" title="Remove">&#215;</span>`;

        html += `<div class="item-card ${item.type}${conflict}" data-id="${item.id}" data-parent="${item.parentId||''}" title="${title.replace(/"/g,'&quot;')}">
          ${truncate(item.name, 30)}<span class="card-icons">${icons}</span></div>`;
      });
      html += `</div>`;
    });
  });

  html += `</div></div>`;

  const qc = state.items.filter(i=>i.type==='quiz').length;
  const ac = state.items.filter(i=>i.type==='assignment').length;
  const dc = state.items.filter(i=>i.type==='discussion').length;
  html += `<div class="stats-bar">
    <span><strong>${lectCount}</strong> Lectures</span><span><strong>${qc}</strong> Quizzes</span>
    <span><strong>${ac}</strong> Assignments</span><span><strong>${readCount}</strong> Readings</span>
    <span><strong>${dc}</strong> Discussions</span>
    <span style="margin-left:auto"><strong>${weeks.length}</strong> Weeks</span></div>`;
  html += `<div class="shortcuts-hint"><kbd>Ctrl</kbd>+<kbd>Z</kbd> Undo &middot; Drag lectures → auto-cascade + dependents follow &middot; <span style="opacity:0.5">&#128279;</span> linked items move with their lecture &middot; Click <strong>+</strong> on any day to add</div>`;
  app.innerHTML = html;
}

// ======== DRAG AND DROP ========
let dragState_dd = null, lastHighlighted = null;

document.addEventListener('pointerdown', (e) => {
  // Delete button click
  const delBtn = e.target.closest('.delete-btn');
  if (delBtn) { e.preventDefault(); e.stopPropagation();
    const id = parseInt(delBtn.dataset.delId);
    const item = state.items.find(i => i.id === id);
    if (item && confirm(`Remove "${item.name}"?`)) deleteItem(id);
    return;
  }
  // Add button click
  const addBtn = e.target.closest('.add-btn');
  if (addBtn) { e.preventDefault(); openModal(addBtn.dataset.addDate); return; }

  const card = e.target.closest('.item-card');
  if (!card || e.button !== 0) return;
  e.preventDefault();
  const itemId = parseInt(card.dataset.id);
  const item = state.items.find(i => i.id === itemId);
  const rect = card.getBoundingClientRect();
  const ghost = card.cloneNode(true);
  ghost.className = 'item-card ' + item.type + ' drag-ghost';
  ghost.style.width = Math.min(rect.width, 180) + 'px';
  // Remove icons from ghost
  const iconsEl = ghost.querySelector('.card-icons');
  if (iconsEl) iconsEl.remove();
  document.body.appendChild(ghost);
  dragState_dd = { itemId, item, ghost, offsetX: e.clientX-rect.left, offsetY: e.clientY-rect.top,
    startX: e.clientX, startY: e.clientY, isDragging: false };
  card.classList.add('dragging');
  ghost.style.left = (e.clientX - dragState_dd.offsetX) + 'px';
  ghost.style.top = (e.clientY - dragState_dd.offsetY) + 'px';
});

document.addEventListener('pointermove', (e) => {
  if (!dragState_dd) return;
  if (!dragState_dd.isDragging) {
    if (Math.hypot(e.clientX-dragState_dd.startX, e.clientY-dragState_dd.startY) < 5) return;
    dragState_dd.isDragging = true;
    dragState_dd.ghost.style.display = 'block';
    if (state.lectureOrder.includes(dragState_dd.itemId)) {
      document.querySelectorAll('.day-cell').forEach(cell => {
        const d = parseDate(cell.dataset.date);
        if (!isClassDay(d) || isSpringBreak(cell.dataset.date)) cell.classList.add('drag-invalid');
      });
    }
  }
  dragState_dd.ghost.style.left = (e.clientX - dragState_dd.offsetX) + 'px';
  dragState_dd.ghost.style.top = (e.clientY - dragState_dd.offsetY) + 'px';

  dragState_dd.ghost.style.display = 'none';
  const el = document.elementFromPoint(e.clientX, e.clientY);
  dragState_dd.ghost.style.display = 'block';
  if (lastHighlighted) { lastHighlighted.classList.remove('drag-over'); lastHighlighted = null; }
  const cell = el?.closest('.day-cell');
  if (cell && isValidDrop(dragState_dd.itemId, cell.dataset.date)) { cell.classList.add('drag-over'); lastHighlighted = cell; }

  const scrollEl = document.querySelector('.calendar-scroll');
  if (scrollEl) {
    const sr = scrollEl.getBoundingClientRect();
    if (e.clientY < sr.top + 50) scrollEl.scrollTop -= 6;
    else if (e.clientY > sr.bottom - 50) scrollEl.scrollTop += 6;
  }
});

document.addEventListener('pointerup', (e) => {
  if (!dragState_dd) return;
  if (dragState_dd.isDragging) {
    dragState_dd.ghost.style.display = 'none';
    const el = document.elementFromPoint(e.clientX, e.clientY);
    const cell = el?.closest('.day-cell');
    let movedIds = [];
    if (cell && isValidDrop(dragState_dd.itemId, cell.dataset.date)) {
      movedIds = moveItem(dragState_dd.itemId, cell.dataset.date);
    }
    cleanupDrag(); render();
    if (movedIds.length > 0) {
      requestAnimationFrame(() => movedIds.forEach(id => {
        const el = document.querySelector(`.item-card[data-id="${id}"]`);
        if (el) el.classList.add('just-moved');
      }));
    }
  } else { cleanupDrag(); }
});

// Hover highlight for dependencies
document.addEventListener('mouseover', (e) => {
  const card = e.target.closest('.item-card');
  if (!card) return;
  const id = parseInt(card.dataset.id);
  // Highlight dependents
  state.items.filter(i => i.parentId === id).forEach(dep => {
    const el = document.querySelector(`.item-card[data-id="${dep.id}"]`);
    if (el) el.classList.add('dep-highlight');
  });
  // Highlight parent
  const item = state.items.find(i => i.id === id);
  if (item?.parentId) {
    const el = document.querySelector(`.item-card[data-id="${item.parentId}"]`);
    if (el) el.classList.add('dep-highlight');
  }
});
document.addEventListener('mouseout', (e) => {
  const card = e.target.closest('.item-card');
  if (!card) return;
  document.querySelectorAll('.item-card.dep-highlight').forEach(el => el.classList.remove('dep-highlight'));
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') { if (dragState_dd) { cleanupDrag(); render(); } closeModal(); }
  if (e.key === 'z' && (e.ctrlKey || e.metaKey) && !e.shiftKey) { e.preventDefault(); undo(); }
});

function cleanupDrag() {
  if (!dragState_dd) return;
  dragState_dd.ghost.remove();
  document.querySelectorAll('.drag-over').forEach(c => c.classList.remove('drag-over'));
  document.querySelectorAll('.drag-invalid').forEach(c => c.classList.remove('drag-invalid'));
  document.querySelectorAll('.item-card.dragging').forEach(c => c.classList.remove('dragging'));
  dragState_dd = null; lastHighlighted = null;
}

function isValidDrop(itemId, dateStr) {
  const item = state.items.find(i => i.id === itemId);
  if (!item) return false;
  if (state.lectureOrder.includes(itemId)) {
    const d = parseDate(dateStr);
    if (!isClassDay(d) || isSpringBreak(dateStr)) return false;
  }
  return true;
}

// ======== EXPORT ========
function exportSchedule() {
  const sorted = [...state.items].sort((a,b) => a.date.localeCompare(b.date));
  let csv = 'Date,Day,Type,Name,LinkedTo\n';
  sorted.forEach(item => {
    const d = parseDate(item.date);
    const dn = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
    const nm = item.name.replace(/"/g,'""');
    const parent = item.parentId ? (state.items.find(p=>p.id===item.parentId)?.name||'').replace(/"/g,'""') : '';
    csv += `${item.date},${dn},${item.type},"${nm}","${parent}"\n`;
  });
  const blob = new Blob([csv],{type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url;
  a.download = `${CONFIG.courseName.replace(/\s+/g,'_')}_schedule.csv`;
  a.click(); URL.revokeObjectURL(url);
  showToast('Schedule exported as CSV');
}

// ======== INIT ========
function init() {
  const saved = loadState();
  if (saved) {
    state.items = saved.items; state.lectureOrder = saved.lectureOrder; state.nextId = saved.nextId || 200;
  } else {
    state.items = deepClone(INITIAL_ITEMS); state.lectureOrder = [...INITIAL_LECTURE_ORDER]; state.nextId = 200;
  }
  render();
}
init();
</script>
